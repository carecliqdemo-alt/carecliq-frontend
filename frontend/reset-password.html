<!DOCTYPE html>
<html lang="en" class="standalone-login-root">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | CareCliQ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="./css/login.css">
<link rel="stylesheet" href="./css/auth.css">
</head>

<body class="standalone-login-page">

<div class="carecliq-auth-modal">

<div class="carecliq-auth-modal-content">

<main class="carecliq-login-page">

<section class="carecliq-login-card">

<div class="auth-logo">

<img src="../images/logo2.png" alt="CareCliQ">

</div>
<h1>

Reset

<span>Password</span>

</h1>

<p>

Create a new secure password for your CareCliQ account.

</p>

<form id="resetPasswordForm">

<div class="form-field">

<input
type="password"
id="password"
required>

<label>

New Password

</label>

<span
class="password-toggle"
data-target="password">

👁

</span>

</div>

<div class="form-field">

<input
type="password"
id="confirmPassword"
required>

<label>

Confirm Password

</label>

<span
class="password-toggle"
data-target="confirmPassword">

👁

</span>

</div>

<div class="password-strength">

<div class="strength-bar"></div>

<p id="strengthText">

Password Strength

</p>

</div>

<button
type="submit"
class="auth-btn">

Update Password

</button>

</form>

<div
class="auth-success"
id="successBox">

<div class="success-icon">

✓

</div>

<h3>

Password Updated

</h3>

<p>

Your password has been changed successfully.

You can now sign in.

</p>

<a
href="../login.html"
class="back-login">

Go to Login

</a>

</div>

</section>

</main>

</div>

</div>

<script src="./js/auth-api.js"></script>
<script src="./js/reset-password.js"></script>

</body>

</html>
