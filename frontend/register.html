<!DOCTYPE html>
<html lang="en" class="standalone-login-root">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | CareCliQ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="./css/login.css">
<link rel="stylesheet" href="./css/auth.css">
</head>

<body class="standalone-login-page">

<div class="carecliq-auth-modal">
<div class="carecliq-auth-modal-content">

<main class="carecliq-login-page">

<section class="carecliq-login-card">

<div class="auth-logo">

<img src="../images/logo2.png" alt="CareCliQ">

</div>


<h1>
Create
<span>Account</span>
</h1>

<p>
Join CareCliQ and start simplifying multilingual care communication.
</p>

<form id="registerForm">

<div class="form-field">
<input
type="text"
id="fullName"
required>

<label>
Full Name
</label>
</div>

<div class="form-field">
<input
type="text"
id="organisation"
required>

<label>
Organisation
</label>
</div>

<div class="form-field">

<select id="role" required>

<option value="" disabled selected>Select Your Role</option>

<option value="Support Coordinator">Support Coordinator</option>

<option value="Support Worker">Support Worker</option>

<option value="Provider">Provider</option>

<option value="Manager">Manager</option>

<option value="Administrator">Administrator</option>

<option value="Interpreter">Interpreter</option>

<option value="Other">Other</option>

</select>

</div>

<div class="form-field">
<input
type="email"
id="email"
required>

<label>
Email Address
</label>
</div>

<div class="form-field">
<input
type="tel"
id="phone"
required>

<label>
Phone Number
</label>
</div>

<div class="form-field">

<input
type="password"
id="password"
required>

<label>
Password
</label>

<span class="password-toggle"
data-target="password">
👁
</span>

</div>

<div class="form-field">

<input
type="password"
id="confirmPassword"
required>

<label>
Confirm Password
</label>

<span class="password-toggle"
data-target="confirmPassword">
👁
</span>

</div>

<div class="password-strength">

<div class="strength-bar"></div>

<p id="strengthText">
Password Strength
</p>

</div>

<button
type="submit"
class="auth-btn">

Create Account

</button>

<div class="auth-links">

<a href="../login.html">

Already have an account?

</a>

<button
  type="button"
  class="auth-panel-link"
  data-show-panel="forgot"
>
  Forgot Password?
</button>

</div>

</form>

</section>

</main>

</div>

</div>

<!-- COPY YOUR EXISTING FOOTER HERE -->
<script src="./js/auth-api.js"></script>
<script src="./js/register.js"></script>

</body>

</html>
