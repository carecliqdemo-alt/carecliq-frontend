<!DOCTYPE html>
<html lang="en" class="standalone-login-root">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | CareCliQ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="./css/login.css">
<link rel="stylesheet" href="./css/auth.css">

</head>

<body class="standalone-login-page">

<div class="carecliq-auth-modal">

<div class="carecliq-auth-modal-content">

<main class="carecliq-login-page">

<section class="carecliq-login-card">

<div class="auth-logo">

 <img src="../images/logo2.png" alt="CareCliQ Logo" >

</div>

<h1>

Forgot

<span>Password</span>

</h1>

<p>

Enter your email address and we'll send you a secure password reset link.

</p>

<form id="forgotForm">

<div class="form-field">

<input
id="email"
type="email"
required>

<label>
Email Address
</label>

</div>


<button class="auth-btn" type="submit">
Send Reset Link
</button>


</form>

<div
class="auth-success"
id="successBox">

<div class="success-icon">

✓

</div>

<h3>

Email Sent

</h3>

<p>

If an account exists for this email address,
we've sent password reset instructions.

</p>

<a
href="../login.html"
class="back-login">

Return to Login

</a>

</div>

<div class="auth-links">

<button
  type="button"
  class="auth-panel-link"
  data-show-panel="register"
>
  Create Account
</button>

<a href="../login.html">
Back to Login
</a>

</div>
</section>

</main>

</div>

</div>
<!-- COPY YOUR EXISTING FOOTER HERE -->

<script src="./js/auth-api.js"></script>
<script src="./js/forgot-password.js"></script>

</body>

</html>
