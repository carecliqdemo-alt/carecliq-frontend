        src="./images/logo2.png"

      >

    <button

      aria-label="Toggle navigation menu"
      aria-expanded="false"

    </button>

    <nav

    >
      <div class="nav-links-center">
        <a href="index.html#features">Features</a>
        <a href="index.html#how-it-works">How it works</a>
        <a href="index.html#languages">Languages</a>
        <a href="contact.html">Contact</a>
      </div>

      <div class="nav-actions-right">
        <a href="login.html" class="btn-login-link">
          Login
        </a>

        <a href="book-demo.html" class="btn-action-pill">
          Book Demo
        </a>
      </div>
    </nav>

  </div>
</header>


<main class="info-page">

   <section class="info-hero">

<h1>
    <span id="infoPageTitle"></span>

</h1>

<p id="infoPageDescription"></p>

<footer class="carecliq-master-footer">
  <div class="footer-container">
    
    <!-- Polished Left Layout Column Block -->
    <div class="footer-left-brand">

      <a href="#" class="footer-logo" aria-label="CareCliQ Home">

      <span class="footer-em-dash">&mdash;</span>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const menuTrigger =
    document.getElementById("menuTrigger");

  const headerNav =
    document.getElementById("headerNav");

  if (!menuTrigger || !headerNav) {
    return;
  }

  menuTrigger.addEventListener("click", function () {

    const isOpen =
      headerNav.classList.toggle("mobile-open");

    menuTrigger.setAttribute(
      "aria-expanded",
      String(isOpen)
    );

  });

});
</script>

<script src="config.js"></script>
<script src="information-pages.js"></script>

</body>
